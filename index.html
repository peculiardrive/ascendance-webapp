<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#121014">
    <meta name="description" content="Ascendance - The Trilogy progressive reading web app.">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="css/styles.css">
    <title>Ascendance - The Trilogy</title>
  </head>
  <body>
    <div id="splash" class="splash" aria-live="polite">
      <div class="splash-inner">
        <img class="splash-logo" src="assets/brand/ascendance-lockup.png" alt="Ascendance The Trilogy" />
        <div class="splash-presenter">
          <span class="presented-by">Presented by</span>
          <img src="assets/brand/brandzilla-technologies.png" alt="BrandZilla Technologies" />
        </div>
      </div>
    </div>

    <div id="app" class="app is-loading"></div>

    <div id="modal-root" class="modal-root" aria-live="polite"></div>

    <script src="js/app.js?v=2" defer></script>
  </body>
</html>
